name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /vision2030-strategy/
      VITE_BASE_PATH: /vision2030-strategy/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (static)
        run: bun run build

      - name: Locate static output directory
        id: locate
        run: |
          set -e
          for dir in dist/client dist/public dist .output/public .output/dist build; do
            if [ -d "$dir" ] && [ -f "$dir/index.html" ]; then
              echo "found=$dir" >> "$GITHUB_OUTPUT"
              echo "Static output detected at: $dir"
              break
            fi
          done
          if [ -z "${found:-}" ] && ! grep -q '^found=' "$GITHUB_OUTPUT"; then
            echo "No static output with index.html found. Listing candidates:"
            ls -la dist 2>/dev/null || true
            ls -la .output 2>/dev/null || true
            exit 1
          fi

      - name: Add .nojekyll and SPA 404 fallback
        run: |
          OUT="${{ steps.locate.outputs.found }}"
          touch "$OUT/.nojekyll"
          # SPA fallback: copy index.html to 404.html so refresh on any route works
          cp "$OUT/index.html" "$OUT/404.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.locate.outputs.found }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4